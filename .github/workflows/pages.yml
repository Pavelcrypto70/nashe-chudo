name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Embed cloud snapshot for browser sync
        run: |
          KEY="e2f80e6ed00f2ae08874f4b0dd521b5b3f81f8c9b3ccfe0024b2e10a727e6205"
          NS="nashe-chudo-ira-pavel-k7m2"
          curl -sfS "https://mantledb.sh/v2/${NS}/family/sync" -H "X-Mantle-Key: ${KEY}" -o sync-main.json
          curl -sfS "https://mantledb.sh/v2/${NS}/family/album/ultrasound" -H "X-Mantle-Key: ${KEY}" -o blob-ultrasound.json || echo '{}' > blob-ultrasound.json
          curl -sfS "https://mantledb.sh/v2/${NS}/family/album/story" -H "X-Mantle-Key: ${KEY}" -o blob-story.json || echo '{}' > blob-story.json
          node scripts/build-sync-snapshot.js

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
